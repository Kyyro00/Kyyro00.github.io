  <section class="content">
    <!-- Mouse-Reactive Floating Image Gallery -->
    <div class="gallery">
      <div class="gallery-inner" id="galleryInner">
        <div class="floating" data-depth="0.08" data-title="Paisaje Urbano" data-description="Una escena de ciudad con luz natural y mucho detalle en arquitectura." tabindex="0"><img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?q=80&w=800&auto=format&fit=crop&ixlib=rb-4.0.3&s=1b2f6b9d1ef2a2b4f4f6e2c3a4b8c9d0" alt="Paisaje urbano"></div>

        <div class="floating" data-depth="0.1" data-title="Profundidad" data-description="Plano medio con detalle suave y separacion visual del fondo." tabindex="0"><img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=800&auto=format&fit=crop&ixlib=rb-4.0.3&s=5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d" alt="Profundidad"></div>

      </div>
    </div>

    <div class="gallery-info" id="galleryInfo" aria-live="polite">
      <h3 id="galleryInfoTitle">Haz clic en una imagen</h3>
      <p id="galleryInfoText">Aparecera aqui su informacion.</p>
    </div>
