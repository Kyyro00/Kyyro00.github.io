<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kyyro00 - Galería</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="gallery.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="gallery-page">
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">Kyyro00</a>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="projects.html" class="nav-link">Proyectos</a>
        <a href="gallery.html" class="nav-link active">Galería</a>
        <a href="about.html" class="nav-link">Acerca de</a>
        <a href="contact.html" class="nav-link">Contacto</a>
      </div>
    </div>
  </nav>

  <section class="content">
    <!-- Mouse-Reactive Floating Image Gallery -->
    <div class="gallery">
      <div class="gallery-inner" id="galleryInner">
        <div class="floating" data-depth="0.08" data-title="Perro" data-description="Una escena de ciudad con luz natural y mucho detalle en arquitectura." tabindex="0"><img src="/IMG's/IMG/img1.jpeg" alt="Paisaje urbano"></div>
        <div class="floating" data-depth="0.12" data-title="Concierto" data-description="Composicion con enfoque en color, contraste y formas organicas." tabindex="0"><img src="/IMG's/IMG/escenario.jpeg" alt="Color y textura"></div>
        <div class="floating" data-depth="0.06" data-title="Julio" data-description="Vista abierta con profundidad y tonos frios para un efecto calmado." tabindex="0"><img src="/IMG's/IMG/juliocam.jpeg" alt="Horizonte"></div>
        <div class="floating" data-depth="0.16" data-title="Luz" data-description="Fotografia con iluminacion calida para resaltar volumen y color." tabindex="0"><img src="/IMG's/IMG/project1.jpeg" alt="Luz dorada"></div>
        <div class="floating" data-depth="0.1" data-title="Spine" data-description="Plano medio con detalle suave y separacion visual del fondo." tabindex="0"><img src="/IMG's/IMG/project2.jpeg" alt="Profundidad"></div>
        <div class="floating" data-depth="0.04" data-title="Ghosts" data-description="Escena natural que aporta equilibrio visual y sensacion de aire libre." tabindex="0"><img src="/IMG's/IMG/Project3.jpeg" alt="Naturaleza"></div>
      </div>
    </div>

    <div class="gallery-info" id="galleryInfo" aria-live="polite">
      <h3 id="galleryInfoTitle">Haz clic en una imagen</h3>
      <p id="galleryInfoText">Aparecera aqui su informacion.</p>
    </div>
  </section>

  <script src="gallery.js"></script>
</body>


</html>
